appId: com.clipnote.app
productName: ClipNote
copyright: Copyright © 2026

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json

directories:
  output: release

publish: null
